    <link rel="stylesheet" href="./src/index.css" />

  </head>

    <script>

      const galleryItems = [

        { style: '--sref 6213523175', src: './public/3.png', alt: 'Garden', prompt: 'Garden' },
        { style: '--sref 5648081772', src: './public/8.png', alt: 'Woman is sitting on a branch', prompt: 'Woman is sitting on a branch' },
        { style: '--sref 7268283103', src: './public/5.png', alt: 'Bird', prompt: 'Bird' },
        { style: '--sref 7268283103', src: './public/6.png', alt: 'Sunrise', prompt: 'Person is viewing sunrise' },
        { style: '--sref 6609586403', src: './public/7.png', alt: 'Woman portrait', prompt: 'Woman portrait' },
        { style: '--sref 6535417993', src: './public/9.png', alt: 'Statue', prompt: 'Statue' },
        { style: '--sref 7762567854', src: './public/10.png', alt: 'Picnic', prompt: 'Picnic' },
        { style: '--sref 5666189692', src: './public/11.png', alt: 'Balancing stones', prompt: 'Balancing stones' },
        { style: '--sref 7827189344', src: './public/12.png', alt: 'Lake in a forest', prompt: 'Lake in a forest' },
        { style: '--sref 7790286388', src: './public/13.png', alt: 'Snail carying small snail', prompt: 'Snail carying small snail' },
        { style: '--sref 4379256578', src: './public/14.png', alt: 'Bridge', prompt: 'Bridge' },
        { style: '--sref 5742545310', src: './public/15.png', alt: 'Northen lights', prompt: 'Northen lights' },
        { style: '--sref 5988056550', src: './public/16.png', alt: 'Vase with flower', prompt: 'Vase with flower' },
        { style: '--sref 7366854016 7268283103', src: './public/17.png', alt: 'Flower crown', prompt: 'Flower crown' },
        { style: '--sref 7198770506', src: './public/18.png', alt: 'Magic', prompt: 'Magic' },
        { style: '--sref 6232303497', src: './public/19.png', alt: 'MIDJOURNEY STYLE 19', prompt: '' },
        { style: '--sref 8161832504 5666189692 7790286388', src: './public/20.png', alt: 'MIDJOURNEY STYLE 20', prompt: 'Loaf of bread' },
        { style: '--sref 7936152627', src: './public/21.png', alt: 'Cat in the flower field', prompt: 'Cat in the flower field' },
        { style: '--sref 7957040092', src: './public/22.png', alt: 'Butterflies', prompt: 'Butterflies' },
        { style: '--sref 6771827822', src: './public/23.png', alt: 'Greek myths', prompt: 'Greek myths' },
        { style: '--sref 5397164518', src: './public/24.png', alt: 'Fantastic chreature', prompt: 'Fantastic chreature' },
        { style: '--sref 7356350689', src: './public/25.png', alt: 'Glass pomegranate', prompt: 'Glass pomegranate' },
        { style: '--sref 6005291080', src: './public/26.png', alt: 'Bloom', prompt: 'Bloom' },
        { style: '--sref 7791583285', src: './public/27.png', alt: 'Landscape', prompt: 'Landscape' },
        { style: '--sref 5302701543', src: './public/28.png', alt: 'Portrait', prompt: 'Portrait' },
        { style: '--sref 5664801964', src: './public/29.png', alt: 'Bar', prompt: 'Bar' },
        { style: '--sref 5302701543', src: './public/30.png', alt: 'Cocktail', prompt: 'Cocktail' },
        { style: '--sref 6937524997', src: './public/31.png', alt: 'Library', prompt: 'Library' },
        { style: '--sref 6937524997', src: './public/32.1.png', alt: 'Classic art', prompt: 'Classic art' },
        { style: '--sref 6545273707', src: './public/33.png', alt: 'Peace', prompt: 'Peace' },
        { style: '--sref 4441123909', src: './public/34.png', alt: 'Stockholm', prompt: 'Stockholm' },
        { style: '--sref 7339699678', src: './public/35.png', alt: 'People', prompt: 'People' },
        { style: '--sref 6979214285', src: './public/36.png', alt: '2d abstract in 3d space', prompt: '2d abstract in 3d space' },
        { style: '--sref 5137077165', src: './public/37.png', alt: 'surreal', prompt: 'surreal' },
        { style: '--sref 5137077165', src: './public/38.png', alt: 'emotion', prompt: 'emotion' },
        { style: '--sref 5137077165', src: './public/39.png', alt: 'glass pyramid', prompt: 'glass pyramid' },
        { style: '--sref 5137077165', src: './public/40.png', alt: 'sea world', prompt: 'sea world' },
        { style: '--sref 5137077165', src: './public/41.png', alt: 'fisherman', prompt: 'fisherman' },
      ];

      function App() {
        const [copiedIndex, setCopiedIndex] = useState(null);
        const [shuffledItems, setShuffledItems] = useState(galleryItems);

        useEffect(() => {
          // Seeded shuffle function
          function seededShuffle(array, seed) {
            const arr = [...array];
            let random = seed;
            for (let i = arr.length - 1; i > 0; i--) {
              random = (random * 9301 + 49297) % 233280;
              const j = Math.floor((random / 233280) * (i + 1));
              [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
          }

          // Get today's date as seed
          const today = new Date().toDateString();
          const seed = today.split(' ').reduce((acc, part) => acc + part.charCodeAt(0), 0);
          
          // Shuffle items based on today's date
          setShuffledItems(seededShuffle(galleryItems, seed));
        }, []);

        useEffect(() => {
          if (copiedIndex === null) return;

          const timeout = window.setTimeout(() => {
            setCopiedIndex(null);
          }, 2000);

          return () => window.clearTimeout(timeout);
        }, [copiedIndex]);

        const handleCopy = async (style, index) => {
          try {
            await navigator.clipboard.writeText(style);
            setCopiedIndex(index);
          } catch (error) {
            console.warn('Copy failed', error);
          }
        };

        return h(
          'div',
          { className: 'page-shell' },
          h(
            'header',
            { className: 'page-header' },
            h('div', { className: 'corner-label' }, 'Anna Chuprina MJ')
          ),
          h(
            'div',
            { className: 'page-note-row' },
            h('div', { className: 'page-note' }, 'Collection of Midjourney styles. Copy and experiment.'),
            h('div', { className: 'style-count' }, `${shuffledItems.length} styles`)
          ),
          h(
            'section',
            { className: 'gallery-section' },
            h(
              'div',
              { className: 'gallery-row' },
              shuffledItems.map((item, index) =>
                h(
                  'div',
                  { className: 'image-card', key: item.src },
                  h('img', { src: item.src, alt: item.alt, className: 'gallery-image' }),
                  h('div', { className: 'prompt-text' }, item.prompt),
                  h(
                    'button',
                    {
                      type: 'button',
                      className: 'copy-style-button',
                      onClick: () => handleCopy(item.style, index),
                    },
                    h('span', { className: 'button-icon', 'aria-hidden': 'true' }, h('i', { className: copiedIndex === index ? 'bi bi-check-lg' : 'bi bi-clipboard' })),
                    copiedIndex === index ? ' COPIED' : ' COPY STYLE'
                  )
                )
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        h(React.StrictMode, null, h(App))
      );
    </script>
  </body>
</html>
